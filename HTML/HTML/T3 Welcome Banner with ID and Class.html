<!DOCTYPE html>
<html>
<head>
<title>Welcome Banner</title>
<style>
/* ID selector */
#welcomeBanner{
    background-color:blue;
    /* Background color */
    color:white;
    /* Text color */
    padding:15px;
    /* Space inside banner */
    text-align:center;
    /* Center text */
}
/* Class selector */
.highlight{
    background-color:yellow;
}
</style>
</head>
<body>
    <div id="welcomeBanner">
        Welcome User
    </div>
    <br>
    <p class="highlight">
        Community Events Open Now
    </p>
    <p>
        Special Offer :
        <span
        style="color:red;
        font-weight:bold;">
            Free Registration
        </span>
    </p>
</body>
</html>
