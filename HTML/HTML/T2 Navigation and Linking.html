<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Navigation Example</title>
</head>
<body>
    <!-- Navigation Menu -->
    <nav>
        <a href="#home">Home</a>
        <!-- Goes to Home section -->
        |
        <a href="#events">Events</a>
        <!-- Goes to Events section -->
        |
        <a href="#contact">Contact</a>
        <!-- Goes to Contact section -->
        |
        <a href="help.html" target="_blank">
            Help
        </a>
        <!-- Opens help.html in new tab -->
    </nav>
    <hr>
    <section id="home">
        <!-- id connects with href -->
        <h2>Home</h2>
        <p>
            Welcome to Community Event Portal.
        </p>
    </section>
    <section id="events">
        <h2>Events</h2>
        <p>
            Upcoming Events Information.
        </p>
    </section>
    <section id="contact">
        <h2>Contact</h2>
        <p>
            Contact Us Here.
        </p>
    </section>
</body>
</html>
