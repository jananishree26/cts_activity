<!DOCTYPE html>
<html>
<head>
<title>Community Event Gallery</title>
<style>
/* Page Styling */
body{
    font-family:Arial;
    text-align:center;
}
/* Image Styling */
.gallery-img{
    width:200px;
    height:150px;
    border:3px solid #3498db;
    border-radius:10px;
}
/* Table Center */
table{
    margin:auto;
}
</style>
</head>
<body>
<h1>Community Event Gallery</h1>
<table>
<tr>
<td>
<img
src="event1.jpg"
alt="Music Event"
title="Music Event"
class="gallery-img">
<p>Music Festival</p>
</td>
<td>
<img
src="event2.jpg"
alt="Sports Event"
title="Sports Event"
class="gallery-img">
<p>Sports Day</p>
</td>
<td>
<img
src="event3.jpg"
alt="Food Event"
title="Food Event"
class="gallery-img">
<p>Food Festival</p>
</td>
</tr>
<tr>
<td>
<img
src="event4.jpg"
alt="Dance Event"
title="Dance Event"
class="gallery-img">
<p>Dance Show</p>
</td>
<td>
<img
src="event5.jpg"
alt="Art Event"
title="Art Event"
class="gallery-img">
<p>Art Exhibition</p>
</td>
<td>
<img
src="event6.jpg"
alt="Book Fair"
title="Book Fair"
class="gallery-img">
<p>Book Fair</p>
</td>
</tr>
</table>
</body>
</html>
