<!DOCTYPE html>
<html>
<head>
<title>Video Invite</title>
<script>
function videoReady(){
document.getElementById("msg").innerHTML =
"Video Ready To Play";
}
window.onbeforeunload = function(){
return "Form not completed";
}
</script>
</head>
<body>
<h2>Event Promo Video</h2>
<video
width="500"
controls
oncanplay="videoReady()">
<source
src="promo.mp4"
type="video/mp4">
</video>
<p id="msg"></p>
</body>
</html>
