<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Column Reordering</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-5">

        <h2 class="text-center mb-4">Column Reordering Example</h2>

        <div class="row">

            <!-- Appears second on md and larger screens -->
            <div class="col-md-6 order-md-2">
                <div class="bg-primary text-white p-4 text-center">
                    Column 1
                </div>
            </div>

            <!-- Appears first on md and larger screens -->
            <div class="col-md-6 order-md-1">
                <div class="bg-success text-white p-4 text-center">
                    Column 2
                </div>
            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
