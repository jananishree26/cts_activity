<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Sidebar</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container-fluid">

    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-3 bg-dark text-white p-4 d-none d-md-block">
            <h4>Sidebar</h4>

            <ul class="nav flex-column">
                <li class="nav-item">
                    <a href="#" class="nav-link text-white">Dashboard</a>
                </li>

                <li class="nav-item">
                    <a href="#" class="nav-link text-white">Profile</a>
                </li>

                <li class="nav-item">
                    <a href="#" class="nav-link text-white">Settings</a>
                </li>

                <li class="nav-item">
                    <a href="#" class="nav-link text-white">Logout</a>
                </li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="col-12 col-md-9 p-4">
            <h2>Main Content Area</h2>

            <p>
                The sidebar is hidden on mobile devices and
                becomes visible on tablets and larger screens.
            </p>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
