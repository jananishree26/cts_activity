<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Button Groups</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="mb-4">Button Groups and Toggle Buttons</h2>

    <!-- Button Group -->
    <h4>Button Group</h4>

    <div class="btn-group mb-4" role="group">
        <button type="button" class="btn btn-primary">Left</button>
        <button type="button" class="btn btn-primary">Middle</button>
        <button type="button" class="btn btn-primary">Right</button>
    </div>

    <hr>

    <!-- Toggle Buttons -->
    <h4>Toggle Buttons with Checkboxes</h4>

    <div class="btn-group" role="group">

        <input type="checkbox" class="btn-check" id="check1" autocomplete="off">
        <label class="btn btn-outline-success" for="check1">
            Option 1
        </label>

        <input type="checkbox" class="btn-check" id="check2" autocomplete="off">
        <label class="btn btn-outline-success" for="check2">
            Option 2
        </label>

        <input type="checkbox" class="btn-check" id="check3" autocomplete="off">
        <label class="btn btn-outline-success" for="check3">
            Option 3
        </label>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
