<!DOCTYPE html>
<html>
<head>
    <title>Event Details</title>
</head>
<body>

<h2>Community Event Information</h2>
<p id="eventInfo"></p>
<button onclick="register()">Register</button>

<script>

const eventName = "Music Festival";
const eventDate = "10-06-2026";
let seats = 50;

document.getElementById("eventInfo").innerHTML =
`Event: ${eventName}<br>
Date: ${eventDate}<br>
Available Seats: ${seats}`;

function register() {

    if(seats > 0) {
        seats--;
        document.getElementById("eventInfo").innerHTML =
        `Event: ${eventName}<br>
        Date: ${eventDate}<br>
        Available Seats: ${seats}`;
    }
    else {
        alert("No seats available");
    }
}

</script>

</body>
</html>
