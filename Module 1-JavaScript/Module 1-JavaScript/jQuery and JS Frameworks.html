<!DOCTYPE html>
<html>
<head>

<title>jQuery Example</title>

<script src=
"https://code.jquery.com/jquery-3.7.1.min.js">
</script>

</head>
<body>

<button id="registerBtn">
Register
</button>

<div id="eventCard">

<h3>Music Festival</h3>

</div>

<script>

$("#registerBtn").click(function(){

$("#eventCard").fadeOut(1000);

setTimeout(function(){

$("#eventCard").fadeIn(1000);

},1000);

});

</script>

</body>
</html>
