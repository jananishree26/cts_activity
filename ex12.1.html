<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Spacing Utilities</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container">

    <!-- Header Section -->
    <div class="bg-primary text-white p-2 m-3">
        <h2>Header Section</h2>
        <p>This section uses p-2 and m-3.</p>
    </div>

    <!-- Content Section -->
    <div class="bg-light border py-5 mt-4">
        <h3 class="text-center">Content Section</h3>
        <p class="text-center">
            This section uses py-5 for vertical padding
            and mt-4 for top margin.
        </p>
    </div>

    <!-- Footer Section -->
    <div class="bg-dark text-white p-2 mt-4">
        <h4>Footer Section</h4>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
