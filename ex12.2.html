<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Section</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container py-5">

    <h2 class="text-center mb-5">Pricing Plans</h2>

    <div class="row g-4">

        <!-- Basic Plan -->
        <div class="col-md-4">
            <div class="card text-center p-3 h-100">
                <div class="card-body">
                    <h3>Basic</h3>
                    <h2 class="my-3">$10</h2>
                    <p>1 User</p>
                    <p>5 GB Storage</p>
                    <p>Email Support</p>
                    <button class="btn btn-primary mt-3">
                        Choose Plan
                    </button>
                </div>
            </div>
        </div>

        <!-- Standard Plan -->
        <div class="col-md-4">
            <div class="card text-center p-3 h-100 border-primary">
                <div class="card-body">
                    <h3>Standard</h3>
                    <h2 class="my-3">$25</h2>
                    <p>5 Users</p>
                    <p>50 GB Storage</p>
                    <p>Priority Support</p>
                    <button class="btn btn-primary mt-3">
                        Choose Plan
                    </button>
                </div>
            </div>
        </div>

        <!-- Premium Plan -->
        <div class="col-md-4">
            <div class="card text-center p-3 h-100">
                <div class="card-body">
                    <h3>Premium</h3>
                    <h2 class="my-3">$50</h2>
                    <p>Unlimited Users</p>
                    <p>200 GB Storage</p>
                    <p>24/7 Support</p>
                    <button class="btn btn-primary mt-3">
                        Choose Plan
                    </button>
                </div>
            </div>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
